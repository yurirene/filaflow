services:
  mysql:
    image: mysql:8.4
    container_name: filaflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DOCKER_MYSQL_DATABASE:-filaflow}
      MYSQL_USER: ${DOCKER_MYSQL_USER:-filaflow}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: filaflow-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_URL: ${APP_URL:-http://localhost:8081}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_MYSQL_DATABASE:-filaflow}
      DB_USERNAME: ${DOCKER_MYSQL_USER:-filaflow}
      DB_PASSWORD: ${DOCKER_MYSQL_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]

  nginx:
    image: nginx:1.27-alpine
    container_name: filaflow-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
